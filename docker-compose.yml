services:
  postgres:
    image: postgres:16
    container_name: github-release-postgres
    restart: always
    environment:
      POSTGRES_DB: releases_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d releases_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: go-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_BASE_URL: http://localhost:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: releases_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
    restart: always

volumes:
  postgres_data:
