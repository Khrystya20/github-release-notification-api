<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe to GitHub Releases</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #555;
            text-align: center;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .message {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Subscribe to GitHub Releases</h1>
    <p>Get email notifications when a new release is published.</p>

    <form id="subscribeForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>

        <label for="repo">Repository</label>
        <input type="text" id="repo" name="repo" placeholder="owner/repository" required>

        <button type="submit">Subscribe</button>
    </form>

    <div id="message" class="message"></div>
</div>

<script>
    const form = document.getElementById("subscribeForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        message.textContent = "";
        message.className = "message";

        const email = document.getElementById("email").value;
        const repo = document.getElementById("repo").value;

        try {
            const response = await fetch("/api/subscribe", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, repo })
            });

            const data = await response.json();

            if (response.ok) {
                message.textContent = data.message || "Subscription successful.";
                message.classList.add("success");
                form.reset();
            } else {
                message.textContent = data.error || "Something went wrong.";
                message.classList.add("error");
            }
        } catch (error) {
            message.textContent = "Failed to send request.";
            message.classList.add("error");
        }
    });
</script>
</body>
</html>
